<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 15px; font-family: Arial, sans-serif; background: #1e1e2e; color: #e0e0e0; }
    h3 { margin-top: 0; color: #ffffff; }
    label { font-weight: bold; color: #aaaaaa; }
    input[type="text"], input[type="password"], select { width: 100%; padding: 8px; margin: 8px 0 15px 0; box-sizing: border-box; border: 1px solid #444; border-radius: 4px; background: #2a2a3c; color: #e0e0e0; }
    .checkbox-group { margin: 8px 0 15px 0; padding: 8px; background: #2a2a3c; border-radius: 4px; border: 1px solid #444; display: flex; align-items: center; }
    .checkbox-group label { font-weight: normal; margin-left: 6px; cursor: pointer; color: #ccc; }
    button { width: 100%; padding: 10px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    button:hover { background: #0052a3; }
    button.success { background: #28a745; }
    button.success:hover { background: #218838; }
    button.secondary { background: #3a3f4b; border: 1px solid #555; }
    button.secondary:hover { background: #4a4f5b; }
    .status { margin-top: 10px; font-size: 12px; color: #28a745; text-align: center; }
    .subbox { padding: 8px; background: #2a2a3c; border-radius: 4px; border: 1px solid #444; margin-bottom: 15px; }
    .subbox input[type="text"], .subbox input[type="password"] { margin: 6px 0; }
    .subbox button { margin-top: 4px; margin-bottom: 4px; }
    .hint { font-size: 11px; color: #888; margin: -10px 0 12px 0; }
    .font-scroll {
      display: flex; gap: 6px; overflow-x: auto; overflow-y: hidden;
      white-space: nowrap; padding-bottom: 4px; margin: 8px 0 6px 0;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .font-scroll::-webkit-scrollbar { display: none; }
    .font-chip {
      flex: 0 0 auto; padding: 7px 12px; background: #2a2a3c; color: #ccc;
      border: 2px solid #555; border-radius: 16px; cursor: pointer;
      font-size: 12px; white-space: nowrap;
    }
    .font-chip:hover { background: #34344a; }
    .font-chip.active { border-color: #28a745; color: #fff; }
    .font-loading { font-size: 11px; color: #888; padding: 4px 0; }
    .font-loading.error { color: #ff4d4d; }
  </style>
</head>
<body>
  <h3>Manga Translator API</h3>
  <label for="serverUrl">FastAPI Server URL:</label>
  <input type="text" id="serverUrl" placeholder="http://localhost:7860">

  <label for="targetLang">Target Language:</label>
  <select id="targetLang">
    <option value="en">English</option>
    <option value="ja">Japanese</option>
    <option value="ko">Korean</option>
    <option value="id">Indonesian</option>
    <option value="ru">Russian</option>
    <option value="es">Spanish</option>
    <option value="cz">Chinese</option>
  </select>

  <label for="ocrMode">OCR Engine:</label>
  <select id="ocrMode">
    <option value="hayai">Hayai (Local, Japanese)</option>
    <option value="glm">GLM (Local, Korean)</option>
    <option value="lens">Google Lens (Cloud, All)</option>
  </select>
  <div id="ocrModeStatus" class="status"></div>

  <label for="ocrLang">OCR Language:</label>
  <select id="ocrLang">
    <option value="ja">Japanese</option>
    <option value="ko">Korean</option>
    <option value="en">English</option>
    <option value="zh">Chinese</option>
    <option value="ru">Russian</option>
  </select>

  <label>Font Family:</label>
  <div id="fontFamilyScroll" class="font-scroll">
    <div class="font-loading">Loading fonts…</div>
  </div>
  <div id="fontFamilyStatus" class="status" style="text-align:left; margin-top:0; margin-bottom:10px;"></div>

  <label>Font Boldness:</label>
  <div id="fontWeightPicker" style="display:flex; gap:8px; margin: 8px 0 15px 0;">
    <div style="font-size:11px; color:#888;">Loading preview…</div>
  </div>
  <input type="hidden" id="fontWeightHidden" value="2">

  <label for="inpaintMode">Inpainting Mode:</label>
  <select id="inpaintMode">
    <option value="low">Low (faster, default)</option>
    <option value="high">High (better quality, bigger model)</option>
  </select>
  <div class="hint">High mode auto-downloads a larger LaMa model on the server the first time it's used.</div>
  <div id="inpaintModeStatus" class="status"></div>

  <label for="modelType">Translation Model:</label>
  <select id="modelType">
    <option value="local">Local (GGUF)</option>
    <option value="openrouter">OpenRouter</option>
  </select>

  <div id="openrouterBox" class="subbox" style="display:none;">
    <label for="openrouterModel">OpenRouter Model:</label>
    <input type="text" id="openrouterModel" placeholder="e.g. openai/gpt-4o-mini">
    <label for="openrouterKey">OpenRouter API Key:</label>
    <input type="password" id="openrouterKey" placeholder="sk-or-...">
    <button id="setModelBtn" class="secondary">Set Model</button>
    <div id="modelStatus" class="status"></div>
  </div>

  <div class="checkbox-group">
    <input type="checkbox" id="colorize" checked>
    <label for="colorize">Enable Colorization</label>
  </div>

  <button id="saveBtn">Save Settings</button>
  <button id="translateBtn" class="success">Translate All Images Now</button>
  <button id="optionsBtn" class="secondary">Advanced Settings (Models)</button>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
